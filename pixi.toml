[workspace]
name = "mise"
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64", "linux-aarch64"]
preview = ["pixi-build"]

[dependencies]
mise = { path = "." }

[tasks]
mise = "mise"

[package]
name = "mise"
version = "4.10.1"

[package.build.backend]
channels = [
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/conda-forge",
]
name = "pixi-build-rust"
