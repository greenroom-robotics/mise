# Run `pre-commit install` once per clone to activate these hooks.
# Mirrors the `Format check` step in .github/workflows/test.yml so fmt
# failures are caught locally before they reach CI.
repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false
