name: Run mise ci release
description: 'Set up the full mise CI environment, install Node + semantic-release deps, run `mise ci release`, and tear down the conda-channel-proxy. Replaces the platform_cli release path for pixi-native ROS packages.'
author: Greenroom Robotics

inputs:
  gh-app-client-id:
    description: GitHub App client id used to mint a token for private deps.
    required: true
  gh-app-private-key:
    description: GitHub App private key (PEM).
    required: true
  azure-client-id:
    description: AZURE_CLIENT_ID — federated identity bound to the calling repo.
    required: true
  azure-tenant-id:
    description: AZURE_TENANT_ID for the channel storage account.
    required: true
  azure-subscription-id:
    description: AZURE_SUBSCRIPTION_ID for the channel storage account.
    required: true
  proxy-version:
    description: conda-channel-proxy release tag.
    required: false
    default: v0.5.1
  package:
    description: Single package to release (default - all packages under package-dir).
    required: false
    default: ""
  package-dir:
    description: Directory containing per-package pixi workspaces.
    required: false
    default: packages
  changelog:
    description: Whether to commit CHANGELOG.md back to the source repo.
    required: false
    default: "true"
  release-branches:
    description: Comma-separated branch list for semantic-release (alpha is treated as prerelease).
    required: false
    default: main,master,alpha
  node-version:
    description: Node major version for semantic-release.
    required: false
    default: "20"
  skip-setup:
    description: Skip the bundled mise/setup step. The caller must have already run setup and pass its gh-token. mise's own release.yml uses this to dogfood the in-repo setup action and avoid a v<MAJOR>-tag chicken-and-egg when the fix lives in setup itself.
    required: false
    default: "false"
  gh-token:
    description: GitHub App token to use when skip-setup is true (the gh-token output of the caller's setup step). Ignored when skip-setup is false.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - id: setup
      if: inputs.skip-setup != 'true'
      uses: greenroom-robotics/mise/.github/actions/setup@v4
      with:
        gh-app-client-id: ${{ inputs.gh-app-client-id }}
        gh-app-private-key: ${{ inputs.gh-app-private-key }}
        azure-client-id: ${{ inputs.azure-client-id }}
        azure-tenant-id: ${{ inputs.azure-tenant-id }}
        azure-subscription-id: ${{ inputs.azure-subscription-id }}
        proxy-version: ${{ inputs.proxy-version }}

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Stage release-tooling into the workspace root
      shell: bash
      env:
        TOOLING_DIR: ${{ github.action_path }}/release-tooling
      run: |
        cp "${TOOLING_DIR}/package.json" ./package.json
        cp "${TOOLING_DIR}/yarn.lock"     ./yarn.lock

    - name: Install semantic-release deps
      shell: bash
      run: yarn install --frozen-lockfile

    - name: Run mise ci release
      shell: bash
      env:
        # GIT_AUTHOR_*/GIT_COMMITTER_* are exported into the job env by setup
        # (bundled or workflow-level), so semantic-release and the recipes-pr
        # exec step commit as the App bot rather than semantic-release-bot —
        # no per-value input plumbing needed here.
        GH_TOKEN: ${{ inputs.skip-setup == 'true' && inputs.gh-token || steps.setup.outputs.gh-token }}
        GITHUB_TOKEN: ${{ inputs.skip-setup == 'true' && inputs.gh-token || steps.setup.outputs.gh-token }}
        API_TOKEN_GITHUB: ${{ inputs.skip-setup == 'true' && inputs.gh-token || steps.setup.outputs.gh-token }}
      run: |
        args=(--package-dir "${{ inputs.package-dir }}"
              --changelog "${{ inputs.changelog }}"
              --release-branches "${{ inputs.release-branches }}")
        if [ -n "${{ inputs.package }}" ]; then
          args+=(--package "${{ inputs.package }}")
        fi
        pixi run --manifest-path "$MISE_MANIFEST" mise ci release "${args[@]}"

    - if: always()
      uses: greenroom-robotics/conda-channel-proxy/.github/actions/teardown@v3
