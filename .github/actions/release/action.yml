name: Run mise ci release
description: 'Set up the full mise CI environment, install Node + semantic-release deps, run `pixi run mise ci release`, and tear down the conda-channel-proxy. Replaces the platform_cli release path for pixi-native ROS packages.'
author: Greenroom Robotics

inputs:
  gh-app-id:
    description: GitHub App id used to mint a token for private deps.
    required: true
  gh-app-private-key:
    description: GitHub App private key (PEM).
    required: true
  azure-client-id:
    description: AZURE_READER_CLIENT_ID — federated identity bound to the calling repo.
    required: true
  azure-tenant-id:
    description: AZURE_TENANT_ID for the channel storage account.
    required: true
  azure-subscription-id:
    description: AZURE_SUBSCRIPTION_ID for the channel storage account.
    required: true
  pixi-url:
    description: URL of the pixi binary to use (defaults to greenroom-robotics fork pin).
    required: false
    default: ""
  pixi-environment:
    description: pixi environment to install.
    required: false
    default: default
  frozen:
    description: Whether to use the frozen lockfile (true/false).
    required: false
    default: "true"
  proxy-version:
    description: conda-channel-proxy release tag.
    required: false
    default: v0.4.0
  package:
    description: Single package to release (default - all packages under package-dir).
    required: false
    default: ""
  package-dir:
    description: Directory containing per-package pixi workspaces.
    required: false
    default: packages
  ros-distro:
    description: ROS distro identifier.
    required: false
    default: kilted
  recipes-repo:
    description: owner/repo of the conda recipes repository to upsert into.
    required: false
    default: greenroom-robotics/ros-kilted-recipes
  changelog:
    description: Whether to commit CHANGELOG.md back to the source repo.
    required: false
    default: "true"
  release-branches:
    description: Comma-separated branch list for semantic-release (alpha is treated as prerelease).
    required: false
    default: main,master,alpha
  node-version:
    description: Node major version for semantic-release.
    required: false
    default: "20"

runs:
  using: composite
  steps:
    - id: setup
      uses: greenroom-robotics/mise/.github/actions/setup@v2
      with:
        gh-app-id: ${{ inputs.gh-app-id }}
        gh-app-private-key: ${{ inputs.gh-app-private-key }}
        azure-client-id: ${{ inputs.azure-client-id }}
        azure-tenant-id: ${{ inputs.azure-tenant-id }}
        azure-subscription-id: ${{ inputs.azure-subscription-id }}
        pixi-url: ${{ inputs.pixi-url }}
        pixi-environment: ${{ inputs.pixi-environment }}
        frozen: ${{ inputs.frozen }}
        proxy-version: ${{ inputs.proxy-version }}

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Stage release-tooling into the workspace root
      shell: bash
      env:
        TOOLING_DIR: ${{ github.action_path }}/release-tooling
      run: |
        cp "${TOOLING_DIR}/package.json" ./package.json
        cp "${TOOLING_DIR}/yarn.lock"     ./yarn.lock

    - name: Install semantic-release deps
      shell: bash
      run: yarn install --frozen-lockfile

    - name: Run mise ci release
      shell: bash
      env:
        GH_TOKEN: ${{ steps.setup.outputs.gh-token }}
        GITHUB_TOKEN: ${{ steps.setup.outputs.gh-token }}
        API_TOKEN_GITHUB: ${{ steps.setup.outputs.gh-token }}
      run: |
        args=(--package-dir "${{ inputs.package-dir }}"
              --ros-distro "${{ inputs.ros-distro }}"
              --recipes-repo "${{ inputs.recipes-repo }}"
              --changelog "${{ inputs.changelog }}"
              --release-branches "${{ inputs.release-branches }}")
        if [ -n "${{ inputs.package }}" ]; then
          args+=(--package "${{ inputs.package }}")
        fi
        pixi run mise ci release "${args[@]}"

    - if: always()
      uses: greenroom-robotics/conda-channel-proxy/.github/actions/teardown@v2
