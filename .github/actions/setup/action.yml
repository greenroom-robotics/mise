name: Set up mise CI environment
description: 'Provision a GitHub App token, Azure credentials, the conda-channel-proxy, the pixi binary, and (unless skip-pixi is set) the mise CLI pinned to this action version. Public action — callable directly from custom workflows. Pair with greenroom-robotics/conda-channel-proxy/.github/actions/teardown@v3 (if: always()) to clean up the proxy.'
author: Greenroom Robotics

inputs:
  gh-app-id:
    description: GitHub App id used to mint a token for private deps.
    required: true
  gh-app-private-key:
    description: GitHub App private key (PEM) corresponding to gh-app-id.
    required: true
  azure-client-id:
    description: AZURE_CLIENT_ID — federated identity bound to the calling repo.
    required: true
  azure-tenant-id:
    description: AZURE_TENANT_ID for the channel storage account.
    required: true
  azure-subscription-id:
    description: AZURE_SUBSCRIPTION_ID for the channel storage account.
    required: true
  proxy-version:
    description: conda-channel-proxy release tag to install.
    required: false
    default: v0.5.1
  skip-pixi:
    description: Skip the pixi install step. For repos whose pixi work happens inside a container build — the proxy, App token, Azure login, and git auth still run on the host.
    required: false
    default: "false"

outputs:
  proxy-url:
    description: Base URL of the running conda-channel-proxy (e.g. http://localhost:12222). Channels live under /general and /overrides; prefer the per-channel outputs below for downstream use.
    value: ${{ steps.proxy.outputs.url }}
  proxy-general-url:
    description: URL of the `general` channel (e.g. http://localhost:12222/general).
    value: ${{ steps.proxy.outputs.general-url }}
  proxy-overrides-url:
    description: URL of the `overrides` channel (e.g. http://localhost:12222/overrides).
    value: ${{ steps.proxy.outputs.overrides-url }}
  gh-token:
    description: GitHub App installation token for downstream steps.
    value: ${{ steps.app-token.outputs.token }}

runs:
  using: composite
  steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.gh-app-id }}
        private-key: ${{ inputs.gh-app-private-key }}
        # Scope the token to the whole installation, not just the calling
        # repo, so the proxy step can `gh release download` from the private
        # conda-channel-proxy repo.
        owner: ${{ github.repository_owner }}

    # Export the App's bot git identity into the job env so every later step
    # in this job — including the release action's semantic-release run, in
    # both the bundled-setup and skip-setup paths — commits as the App rather
    # than semantic-release-bot, with no per-value input plumbing. The numeric
    # user id makes the noreply email link the commit to the App account so
    # GitHub renders it as the App (avatar + Verified badge), instead of the
    # free-text label a hardcoded name would produce.
    - name: Export App git identity
      shell: bash
      env:
        APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        set -euo pipefail
        user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
        name="${APP_SLUG}[bot]"
        email="${user_id}+${APP_SLUG}[bot]@users.noreply.github.com"
        {
          echo "GIT_AUTHOR_NAME=${name}"
          echo "GIT_AUTHOR_EMAIL=${email}"
          echo "GIT_COMMITTER_NAME=${name}"
          echo "GIT_COMMITTER_EMAIL=${email}"
        } >> "$GITHUB_ENV"

    - name: Azure login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Start conda-channel-proxy
      id: proxy
      uses: greenroom-robotics/conda-channel-proxy/.github/actions/setup@v3
      with:
        version: ${{ inputs.proxy-version }}
        gh-token: ${{ steps.app-token.outputs.token }}

    - name: Configure git auth for private GitHub deps
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

    # Install only the pixi binary, we do not use a consumers environment for the CI
    # orchestration tools (e.g. pixi/mise).
    - name: Set up pixi
      if: inputs.skip-pixi != 'true'
      uses: prefix-dev/setup-pixi@v0.9.4
      with:
        pixi-version: v0.70.1
        run-install: false

    # Write a dedicated pixi manifest that depends solely on mise, pinned to the
    # exact version this action ships, then install it. Downstream actions run
    # mise via `pixi run --manifest-path "$MISE_MANIFEST"` (exported below)
    #
    # The version is read from THIS repo's root pixi.toml [package].version —
    # bumped on every release, with the major tag (v<MAJOR>) slid onto that
    # commit — so `setup@vN` always installs the mise built at vN. The channel
    # is the proxy's private `general` channel (dynamic localhost port, hence a
    # generated rather than committed manifest), where mise is published.
    - name: Install mise
      if: inputs.skip-pixi != 'true'
      shell: bash
      env:
        GENERAL_URL: ${{ steps.proxy.outputs.general-url }}
      run: |
        set -euo pipefail
        version="$(python3 -c 'import tomllib; print(tomllib.load(open("'"${GITHUB_ACTION_PATH}"'/../../../pixi.toml","rb"))["package"]["version"])')"
        if [ -z "$version" ]; then
          echo "::error::could not read [package].version from the action's pixi.toml" >&2
          exit 1
        fi
        manifest_dir="${RUNNER_TEMP}/mise-tool"
        mkdir -p "$manifest_dir"
        cat > "${manifest_dir}/pixi.toml" <<EOF
        [workspace]
        name = "mise-tool"
        channels = ["${GENERAL_URL}", "https://prefix.dev/conda-forge"]
        platforms = ["linux-64", "linux-aarch64"]

        [dependencies]
        mise = "==${version}"
        EOF
        echo "Installing mise==${version} from a dedicated tool manifest"
        pixi install --manifest-path "${manifest_dir}/pixi.toml"
        # Export the manifest path so downstream actions invoke mise from it.
        echo "MISE_MANIFEST=${manifest_dir}/pixi.toml" >> "$GITHUB_ENV"
