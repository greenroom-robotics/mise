name: Set up mise CI environment
description: 'Provision a GitHub App token, Azure credentials, the conda-channel-proxy, and (unless skip-pixi is set) a pixi environment. Public action — callable directly from custom workflows. Pair with greenroom-robotics/conda-channel-proxy/.github/actions/teardown@v3 (if: always()) to clean up the proxy.'
author: Greenroom Robotics

inputs:
  gh-app-id:
    description: GitHub App id used to mint a token for private deps.
    required: true
  gh-app-private-key:
    description: GitHub App private key (PEM) corresponding to gh-app-id.
    required: true
  azure-client-id:
    description: AZURE_CLIENT_ID — federated identity bound to the calling repo.
    required: true
  azure-tenant-id:
    description: AZURE_TENANT_ID for the channel storage account.
    required: true
  azure-subscription-id:
    description: AZURE_SUBSCRIPTION_ID for the channel storage account.
    required: true
  pixi-url:
    description: URL of the pixi binary to use (defaults to greenroom-robotics fork pin).
    required: false
    default: ""
  pixi-environment:
    description: pixi environment to install.
    required: false
    default: default
  frozen:
    description: Whether to use the frozen lockfile (true/false).
    required: false
    default: "true"
  proxy-version:
    description: conda-channel-proxy release tag to install.
    required: false
    default: v0.5.0
  skip-pixi:
    description: Skip the pixi install step. For repos whose pixi work happens inside a container build — the proxy, App token, Azure login, and git auth still run on the host.
    required: false
    default: "false"

outputs:
  proxy-url:
    description: Base URL of the running conda-channel-proxy (e.g. http://localhost:12222). Channels live under /general and /overrides; prefer the per-channel outputs below for downstream use.
    value: ${{ steps.proxy.outputs.url }}
  proxy-general-url:
    description: URL of the `general` channel (e.g. http://localhost:12222/general).
    value: ${{ steps.proxy.outputs.general-url }}
  proxy-overrides-url:
    description: URL of the `overrides` channel (e.g. http://localhost:12222/overrides).
    value: ${{ steps.proxy.outputs.overrides-url }}
  gh-token:
    description: GitHub App installation token for downstream steps.
    value: ${{ steps.app-token.outputs.token }}

runs:
  using: composite
  steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ inputs.gh-app-id }}
        private-key: ${{ inputs.gh-app-private-key }}
        # Scope the token to the whole installation, not just the calling
        # repo, so the proxy step can `gh release download` from the private
        # conda-channel-proxy repo.
        owner: ${{ github.repository_owner }}

    - name: Azure login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Start conda-channel-proxy
      id: proxy
      uses: greenroom-robotics/conda-channel-proxy/.github/actions/setup@v3
      with:
        version: ${{ inputs.proxy-version }}
        gh-token: ${{ steps.app-token.outputs.token }}

    - name: Configure git auth for private GitHub deps
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Set up pixi
      if: inputs.skip-pixi != 'true'
      uses: prefix-dev/setup-pixi@v0.9.4
      with:
        pixi-url: ${{ inputs.pixi-url != '' && inputs.pixi-url || (runner.arch == 'ARM64' && 'https://github.com/greenroom-robotics/pixi/releases/download/v0.68.0-gr1/pixi-aarch64-unknown-linux-musl' || 'https://github.com/greenroom-robotics/pixi/releases/download/v0.68.0-gr1/pixi-x86_64-unknown-linux-musl') }}
        environments: ${{ inputs.pixi-environment }}
        frozen: ${{ inputs.frozen }}
