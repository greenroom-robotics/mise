name: Run mise ci build
description: 'Set up the full mise CI environment, run `mise ci build`, and tear down the conda-channel-proxy. Outputs .conda artifacts under $RUNNER_TEMP/conda-bld.'
author: Greenroom Robotics

inputs:
  gh-app-client-id:
    description: GitHub App client id used to mint a token for private deps.
    required: true
  gh-app-private-key:
    description: GitHub App private key (PEM).
    required: true
  azure-client-id:
    description: AZURE_CLIENT_ID — federated identity bound to the calling repo.
    required: true
  azure-tenant-id:
    description: AZURE_TENANT_ID for the channel storage account.
    required: true
  azure-subscription-id:
    description: AZURE_SUBSCRIPTION_ID for the channel storage account.
    required: true
  proxy-version:
    description: conda-channel-proxy release tag.
    required: false
    default: v0.5.1
  package:
    description: Single package to build (default - all packages under package-dir).
    required: false
    default: ""
  package-dir:
    description: Directory containing per-package pixi workspaces.
    required: false
    default: packages
  target-platform:
    description: rattler-build target subdir (linux-64 or linux-aarch64). Empty - host arch.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: greenroom-robotics/mise/.github/actions/setup@v5
      with:
        gh-app-client-id: ${{ inputs.gh-app-client-id }}
        gh-app-private-key: ${{ inputs.gh-app-private-key }}
        azure-client-id: ${{ inputs.azure-client-id }}
        azure-tenant-id: ${{ inputs.azure-tenant-id }}
        azure-subscription-id: ${{ inputs.azure-subscription-id }}
        proxy-version: ${{ inputs.proxy-version }}

    - name: Run mise ci build
      shell: bash
      run: |
        args=(--package-dir "${{ inputs.package-dir }}")
        if [ -n "${{ inputs.package }}" ]; then
          args+=(--package "${{ inputs.package }}")
        fi
        if [ -n "${{ inputs.target-platform }}" ]; then
          args+=(--target-platform "${{ inputs.target-platform }}")
        fi
        pixi run --manifest-path "$MISE_MANIFEST" mise ci build "${args[@]}"

    - if: always()
      uses: greenroom-robotics/conda-channel-proxy/.github/actions/teardown@v5
