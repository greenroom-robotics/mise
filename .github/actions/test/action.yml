name: Run mise ci test
description: 'Set up the full mise CI environment, run `mise ci test`, and tear down the conda-channel-proxy. One-liner replacement for inline pixi/proxy/test wiring in pixi-native ROS package repos.'
author: Greenroom Robotics

inputs:
  gh-app-client-id:
    description: GitHub App client id used to mint a token for private deps.
    required: true
  gh-app-private-key:
    description: GitHub App private key (PEM).
    required: true
  azure-client-id:
    description: AZURE_CLIENT_ID — federated identity bound to the calling repo.
    required: true
  azure-tenant-id:
    description: AZURE_TENANT_ID for the channel storage account.
    required: true
  azure-subscription-id:
    description: AZURE_SUBSCRIPTION_ID for the channel storage account.
    required: true
  proxy-version:
    description: conda-channel-proxy release tag.
    required: false
    default: v5.2.0
  package:
    description: Single package to test (default - all packages under package-dir).
    required: false
    default: ""
  package-dir:
    description: Directory containing per-package pixi workspaces.
    required: false
    default: packages
  report-dir:
    description: Directory to collect JUnit XML test reports into.
    required: false
    default: test-reports
  check-name:
    description: Name of the rendered test-report check (kept distinct from the legacy deb path's "Test Report").
    required: false
    default: Test Report (pixi)
  jobs:
    description: |
      Newline-separated `<env>:<task>` pairs to run per package, e.g.
        tests:test
        tests-boost:test
        lint:lint
      Each line is passed as a `--job` to `mise ci test`. Defaults to
      `tests:test` (the single-environment behaviour) when empty.
    required: false
    default: ""
  locked:
    description: Require the committed pixi.lock to satisfy the manifest and fail on drift (`mise ci test --locked`). On by default; set to "false" to opt out and re-resolve from the manifest (conda-forge style).
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: greenroom-robotics/mise/.github/actions/setup@v5
      with:
        gh-app-client-id: ${{ inputs.gh-app-client-id }}
        gh-app-private-key: ${{ inputs.gh-app-private-key }}
        azure-client-id: ${{ inputs.azure-client-id }}
        azure-tenant-id: ${{ inputs.azure-tenant-id }}
        azure-subscription-id: ${{ inputs.azure-subscription-id }}
        proxy-version: ${{ inputs.proxy-version }}

    - name: Run mise ci test
      shell: bash
      run: |
        args=(--package-dir "${{ inputs.package-dir }}" --report-dir "${{ inputs.report-dir }}")
        if [ -n "${{ inputs.package }}" ]; then
          args+=(--package "${{ inputs.package }}")
        fi
        args+=(--locked "${{ inputs.locked }}")
        # Each non-empty line of `jobs` becomes a --job <env>:<task>.
        while IFS= read -r job; do
          [ -n "$job" ] && args+=(--job "$job")
        done <<< "${{ inputs.jobs }}"
        pixi run --manifest-path "$MISE_MANIFEST" mise ci test "${args[@]}"

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: pixi-test-reports
        path: ${{ inputs.report-dir }}
        if-no-files-found: ignore

    # Skip the report step entirely when the test task emits no JUnit XML
    # (e.g. cargo nextest) so the action doesn't fail on a missing report.
    - name: Check for test reports
      id: reports
      if: always()
      shell: bash
      run: |
        if [ -d "${{ inputs.report-dir }}" ] && [ -n "$(find "${{ inputs.report-dir }}" -name '*.xml' -print -quit)" ]; then
          echo "found=true" >> "$GITHUB_OUTPUT"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
          echo "No JUnit XML under ${{ inputs.report-dir }}; skipping report publish."
        fi

    - name: Publish test report
      if: always() && steps.reports.outputs.found == 'true'
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 #v3
      with:
        name: ${{ inputs.check-name }}
        path: ${{ inputs.report-dir }}/**/*.xml
        reporter: java-junit
        fail-on-error: false

    - if: always()
      uses: greenroom-robotics/conda-channel-proxy/.github/actions/teardown@v5
