name: Publish conda recipe PR off deb tags
description: 'Discover the `<pkg>@<version>` tags the deb release just created (newer than dispatch-sha) and open/update a conda recipe PR per package via `mise ci recipes-pr`. Sets up the mise CI environment and tears down the conda-channel-proxy. Pairs with the deb release (ros_semantic_release_action) which owns tagging.'
author: Greenroom Robotics

inputs:
  gh-app-client-id:
    description: GitHub App client id used to mint a token for private deps and the recipes PR.
    required: true
  gh-app-private-key:
    description: GitHub App private key (PEM).
    required: true
  azure-client-id:
    description: AZURE_CLIENT_ID — federated identity bound to the calling repo.
    required: true
  azure-tenant-id:
    description: AZURE_TENANT_ID for the channel storage account.
    required: true
  azure-subscription-id:
    description: AZURE_SUBSCRIPTION_ID for the channel storage account.
    required: true
  proxy-version:
    description: conda-channel-proxy release tag.
    required: false
    default: v5.2.0
  dispatch-sha:
    description: 'SHA the run was dispatched on. Tags that are NOT ancestors of this SHA were created by the deb release this run; pre-existing tags are skipped.'
    required: true
  package:
    description: Single package to publish (default - every package under package-dir that was released this run).
    required: false
    default: ""
  package-dir:
    description: Directory containing per-package pixi workspaces, or `.` for a single-package repo whose `pixi.toml` lives at the root.
    required: false
    default: packages
  ros-distro:
    description: ROS distro identifier for the conda recipe.
    required: false
    default: kilted
  recipes-repo:
    description: owner/repo of the conda recipes repository to open the PR against.
    required: false
    default: greenroom-robotics/ros-recipes

runs:
  using: composite
  steps:
    - id: setup
      uses: greenroom-robotics/mise/.github/actions/setup@v5
      with:
        gh-app-client-id: ${{ inputs.gh-app-client-id }}
        gh-app-private-key: ${{ inputs.gh-app-private-key }}
        azure-client-id: ${{ inputs.azure-client-id }}
        azure-tenant-id: ${{ inputs.azure-tenant-id }}
        azure-subscription-id: ${{ inputs.azure-subscription-id }}
        proxy-version: ${{ inputs.proxy-version }}

    - name: Fetch tags created by the deb release
      shell: bash
      run: git fetch --tags --force origin

    - name: Publish conda recipe PR for each package released this run
      shell: bash
      env:
        GH_TOKEN: ${{ steps.setup.outputs.gh-token }}
        GITHUB_TOKEN: ${{ steps.setup.outputs.gh-token }}
        API_TOKEN_GITHUB: ${{ steps.setup.outputs.gh-token }}
        DISPATCH_SHA: ${{ inputs.dispatch-sha }}
        ONLY_PACKAGE: ${{ inputs.package }}
        PACKAGE_DIR: ${{ inputs.package-dir }}
        ROS_DISTRO: ${{ inputs.ros-distro }}
        RECIPES_REPO: ${{ inputs.recipes-repo }}
      run: |
        set -euo pipefail
        published=0

        # Open/update the recipe PR for one package at its latest release tag.
        # $1=display label  $2=tag  $3=--package value (may be empty -> CLI derives it)
        publish_one() {
          local label="$1" tag="$2" pkg_arg="$3" ver sha
          [ -n "$tag" ] || return 0
          # Skip tags that already existed before this run: those whose commit
          # is a *strict* ancestor of the dispatch SHA. A fresh release whose
          # tag lands directly on the dispatch commit (semantic-release tags
          # HEAD for packages it doesn't bump a version file for, e.g. vendored
          # ament packages with no pixi.toml) is new, not old — the `!=` keeps
          # it from being mistaken for a pre-existing tag. Peel `${tag}^{}` so
          # this is correct for annotated tags.
          if [ "$(git rev-parse "${tag}^{}")" != "$DISPATCH_SHA" ] \
            && git merge-base --is-ancestor "${tag}^{}" "$DISPATCH_SHA" 2>/dev/null; then
            return 0
          fi
          ver="${tag#*@}"
          sha="$(git rev-list -n1 "$tag")"
          echo "::group::conda recipe PR for ${label}@${ver} (${sha})"
          pixi run --manifest-path "$MISE_MANIFEST" mise ci recipes-pr \
            --version="$ver" \
            --recipes-repo="$RECIPES_REPO" \
            --package="$pkg_arg" \
            --package-dir="$PACKAGE_DIR" \
            --ros-distro="$ROS_DISTRO" \
            --sha="$sha" \
            ${EXTRA_RECIPES_PR_ARGS:-}
          echo "::endgroup::"
          published=$((published+1))
        }

        if [ -f "$PACKAGE_DIR/pixi.toml" ] && grep -q '^\[package\]' "$PACKAGE_DIR/pixi.toml"; then
          # Root single-package layout: package-dir points at the package itself
          # (mirrors `packages::discover`). Tags are plain semver (X.Y.Z); some
          # single-package repos still tag <pkg>@<ver>, so match both.
          globs=('[0-9]*.[0-9]*.[0-9]*')
          [ -n "$ONLY_PACKAGE" ] && globs+=("${ONLY_PACKAGE}@*")
          tag="$(git tag --list "${globs[@]}" --sort=-v:refname | head -n1)"
          publish_one "${ONLY_PACKAGE:-$(basename "$PWD")}" "$tag" "$ONLY_PACKAGE"
        else
          # Multi-package layout: packages/<pkg>/{pixi.toml|package.xml}, <pkg>@<ver> tags.
          if [ -n "$ONLY_PACKAGE" ]; then
            # Explicit target: release exactly this package (may be a vendored
            # package with no pixi.toml). No gate — a missing recipe is a user
            # error the CLI reports loudly.
            tag="$(git tag --list "${ONLY_PACKAGE}@*" --sort=-v:refname | head -n1)"
            publish_one "$ONLY_PACKAGE" "$tag" "$ONLY_PACKAGE"
          else
            # Sweep: every current package (has pixi.toml or package.xml — the
            # latter catches vendored ROS packages like deepstream_extensions,
            # drops junk/renamed dirs).
            # --allow-missing-recipe lets a tagged non-conda package (launch/meta,
            # e.g. perception_bringup) skip instead of failing the whole run.
            EXTRA_RECIPES_PR_ARGS="--allow-missing-recipe"
            for pkg in $(ls "$PACKAGE_DIR"); do
              # A real package has a pixi.toml (pixi-native) or a package.xml
              # (ROS, incl. vendored packages like deepstream_extensions with no
              # pixi.toml). Union keeps both; junk/renamed dirs (neither) drop.
              { [ -f "$PACKAGE_DIR/$pkg/pixi.toml" ] || [ -f "$PACKAGE_DIR/$pkg/package.xml" ]; } || continue
              tag="$(git tag --list "${pkg}@*" --sort=-v:refname | head -n1)"
              publish_one "$pkg" "$tag" "$pkg"
            done
          fi
        fi
        echo "Processed $published package(s) for conda recipe PRs."

    - if: always()
      uses: greenroom-robotics/conda-channel-proxy/.github/actions/teardown@v5
