name: Run mise ci lock-check
description: 'Verify each package''s pixi.lock is present and in sync with its pixi.toml. Sets up the mise CI environment by default; pass skip-setup=true to reuse a caller''s existing setup (e.g. the mise test/build actions).'
author: Greenroom Robotics

inputs:
  gh-app-client-id:
    description: GitHub App client id used to mint a token for private deps.
    required: true
  gh-app-private-key:
    description: GitHub App private key (PEM).
    required: true
  azure-client-id:
    description: AZURE_CLIENT_ID — federated identity bound to the calling repo.
    required: true
  azure-tenant-id:
    description: AZURE_TENANT_ID for the channel storage account.
    required: true
  azure-subscription-id:
    description: AZURE_SUBSCRIPTION_ID for the channel storage account.
    required: true
  proxy-version:
    description: conda-channel-proxy release tag.
    required: false
    default: v0.5.1
  package:
    description: Single package to check (default - all packages under package-dir).
    required: false
    default: ""
  package-dir:
    description: Directory containing per-package pixi workspaces.
    required: false
    default: packages
  skip-setup:
    description: Skip the bundled mise/setup step. The caller must have already run setup in the same job (the mise test/build actions do this so the lockfile gate doesn't pay for a second setup). When true, this action also skips teardown so it doesn't tear down the proxy the caller still needs.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - id: setup
      if: inputs.skip-setup != 'true'
      uses: greenroom-robotics/mise/.github/actions/setup@v4
      with:
        gh-app-client-id: ${{ inputs.gh-app-client-id }}
        gh-app-private-key: ${{ inputs.gh-app-private-key }}
        azure-client-id: ${{ inputs.azure-client-id }}
        azure-tenant-id: ${{ inputs.azure-tenant-id }}
        azure-subscription-id: ${{ inputs.azure-subscription-id }}
        proxy-version: ${{ inputs.proxy-version }}

    - name: Run mise ci lock-check
      shell: bash
      run: |
        args=(--package-dir "${{ inputs.package-dir }}")
        if [ -n "${{ inputs.package }}" ]; then
          args+=(--package "${{ inputs.package }}")
        fi
        pixi run --manifest-path "$MISE_MANIFEST" mise ci lock-check "${args[@]}"

    # Gated on skip-setup (unlike the test/build/release actions, which teardown
    # unconditionally as the last step): when consumed mid-sequence by another
    # action we must NOT tear down the proxy the caller still needs.
    - if: always() && inputs.skip-setup != 'true'
      uses: greenroom-robotics/conda-channel-proxy/.github/actions/teardown@v3
