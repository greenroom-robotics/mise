name: test
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Retry crates.io fetches — registry reads occasionally drop with an SSL
      # eof on the runners; without this a single blip fails the whole job.
      CARGO_NET_RETRY: "5"
    steps:
      - uses: actions/checkout@v6

      # Consumers pin `…/actions/<name>@v<MAJOR>`, and each composite action's
      # internal `setup@v<MAJOR>` ref is what actually selects the mise binary
      # version (setup reads pixi.toml at its own ref). The two only drift on a
      # major bump, when it's easy to forget the internal pins — producing the
      # silent "v5 actions run a v4 binary" bug. Fail here so the bump can't merge.
      - name: Internal setup refs match major
        run: |
          set -euo pipefail
          major="v$(python3 -c 'import tomllib;print(tomllib.load(open("pixi.toml","rb"))["package"]["version"].split(".")[0])')"
          bad="$(grep -rn 'greenroom-robotics/mise/.github/actions/setup@v[0-9]' .github/actions \
                 | grep -v "setup@${major}\b" || true)"
          if [ -n "$bad" ]; then
            echo "::error::internal setup refs must be @${major}:"; echo "$bad"; exit 1
          fi

      - name: Install Rust toolchain
        run: rustup toolchain install stable --component rustfmt,clippy --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets --locked

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Test
        # nextest runs each test in its own process, isolating tests that
        # mutate process-global state (e.g. the $GITHUB_OUTPUT env var).
        # --color always: CI has no TTY, so force ANSI color in the logs.
        run: cargo nextest run --locked --color always

      - name: Doc tests
        # nextest does not run doctests; cover them separately.
        run: cargo test --doc --locked
