name: test
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Retry crates.io fetches — registry reads occasionally drop with an SSL
      # eof on the runners; without this a single blip fails the whole job.
      CARGO_NET_RETRY: "5"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --component rustfmt,clippy --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets --locked

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Test
        # nextest runs each test in its own process, isolating tests that
        # mutate process-global state (e.g. the $GITHUB_OUTPUT env var).
        run: cargo nextest run --locked

      - name: Doc tests
        # nextest does not run doctests; cover them separately.
        run: cargo test --doc --locked
