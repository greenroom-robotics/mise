name: update-major-tag

# Slides the bare `v<MAJOR>` tag (e.g. `v1`, `v2`) forward whenever
# semantic-release cuts a new exact `mise@X.Y.Z` tag. Consumers pin
# `uses: greenroom-robotics/mise/.github/actions/<name>@v<MAJOR>` and
# automatically pick up minor/patch updates to the composite actions.
#
# The exact `mise@X.Y.Z` tags are managed by recipes-release.yml and version
# the Rust binary distributed via the conda channel. The `v<MAJOR>` sliding
# tags managed here are an *independent* versioning scheme for the composite
# actions shipped under .github/actions/. Bumping `mise@2.X.Y` → `mise@3.0.0`
# does not automatically mean the actions break — but as a convention we
# slide `v<MAJOR>` in lockstep so consumers have a single coherent dial.
on:
  push:
    tags:
      - 'mise@*'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Default GITHUB_TOKEN can push tags, but won't trigger downstream
          # workflows on the force-push of `v<N>`. That's fine here — nothing
          # listens for v<N> tag updates.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force-push sliding major tag
        env:
          PUSHED_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Tag format from recipes-release.yml is `mise@X.Y.Z`. Strip the
          # `mise@` prefix and pull the first dotted segment.
          VERSION="${PUSHED_TAG#mise@}"
          MAJOR="${VERSION%%.*}"
          if ! [[ "$MAJOR" =~ ^[0-9]+$ ]]; then
            echo "::error::could not parse major version from tag $PUSHED_TAG" >&2
            exit 1
          fi
          SLIDING="v${MAJOR}"
          echo "Pointing $SLIDING at $GITHUB_SHA (from $PUSHED_TAG)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$SLIDING" "$GITHUB_SHA"
          git push origin "$SLIDING" --force
