# Reusable workflow: fan a multi-package repo's `mise ci test` across one runner
# per package (matrix), instead of looping all packages sequentially on one
# runner. Each package builds in full isolation — no shared build/, no CPU/RAM
# contention — at the cost of repeating the setup on each runner.
#
# Single-package repos don't need this; they keep using the actions/test
# composite directly. This wrapper just discovers packages → matrix → composite.
#
# Usage (in a consumer repo's .github/workflows/test.yml):
#
#   jobs:
#     test:
#       uses: greenroom-robotics/mise/.github/workflows/ci-test.yml@v5
#       with:
#         runner: runs-on=${{ github.run_id }}/runner=...
#         package-dir: packages
#         changed-only: true        # PRs test only changed packages
#         jobs: |
#           tests:test
#       secrets:
#         gh-app-client-id: ${{ secrets.GH_APP_CLIENT_ID }}
#         gh-app-private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
#         azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
#         azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
#         azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
name: mise ci test (matrix)

on:
  workflow_call:
    inputs:
      runner:
        description: runs-on label/expression for all jobs (e.g. a runs-on.com dynamic runner).
        required: true
        type: string
      runners:
        description: 'JSON map of package -> runner override, e.g. {"detector":"...gpu..."}. Packages absent from the map fall back to `runner`.'
        required: false
        type: string
        default: "{}"
      package:
        description: Single package to test (default - all packages under package-dir).
        required: false
        type: string
        default: ""
      package-dir:
        description: Directory containing per-package pixi workspaces.
        required: false
        type: string
        default: packages
      report-dir:
        description: Directory to collect JUnit XML test reports into.
        required: false
        type: string
        default: test-reports
      jobs:
        description: Newline-separated `<env>:<task>` pairs to run per package (passed to actions/test).
        required: false
        type: string
        default: ""
      proxy-version:
        description: conda-channel-proxy release tag.
        required: false
        type: string
        default: v0.5.1
      changed-only:
        description: On pull_request, test only packages whose files changed (push/dispatch always test all).
        required: false
        type: boolean
        default: false
      lfs:
        description: Check out Git LFS objects in the test job (for repos with LFS test fixtures).
        required: false
        type: boolean
        default: false
    secrets:
      gh-app-client-id:
        required: true
      gh-app-private-key:
        required: true
      azure-client-id:
        required: true
      azure-tenant-id:
        required: true
      azure-subscription-id:
        required: true

jobs:
  # Cheap: list package dirs (optionally narrowed to changed ones on PRs) and
  # emit a matrix. No proxy/Azure/mise here so it costs seconds, not a full setup.
  discover:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      pull-requests: read   # paths-filter reads the PR's changed-file list
    outputs:
      packages: ${{ steps.assemble.outputs.packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # paths-filter diffs against the base ref

      - id: all
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
          PACKAGE_DIR: ${{ inputs.package-dir }}
        # ponytail: ~10 lines replacing the repos' colcon-list detect step.
        # The composite's --package wants the *directory* name, which is exactly
        # what we emit — so no colcon needed to resolve real paths. Ceiling:
        # assumes dir-name == package name (true for these flat repos) and
        # ignores root-[package] single-package repos (they use the composite).
        run: |
          set -euo pipefail
          if [ -n "$PACKAGE" ]; then
            names="$PACKAGE"
          else
            names=$(find "$PACKAGE_DIR" -mindepth 1 -maxdepth 1 -type d \
              -exec test -e '{}/pixi.toml' ';' -printf '%f\n' | sort)
          fi
          all=$(printf '%s' "$names" | jq -Rsc 'split("\n") | map(select(length>0))')
          if [ "$all" = "[]" ]; then
            echo "::error::no packages with pixi.toml found under $PACKAGE_DIR"; exit 1
          fi
          echo "all=$all" >> "$GITHUB_OUTPUT"
          # paths-filter map: one `pkg: '<dir>/pkg/**'` line per package.
          {
            echo 'map<<__EOF__'
            printf '%s' "$names" | while IFS= read -r n; do
              [ -n "$n" ] && printf "%s: '%s/%s/**'\n" "$n" "$PACKAGE_DIR" "$n"
            done
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      - id: filter
        if: ${{ inputs.changed-only && inputs.package == '' && github.event_name == 'pull_request' }}
        uses: dorny/paths-filter@v3
        with:
          filters: ${{ steps.all.outputs.map }}
          list-files: none

      - id: assemble
        shell: bash
        env:
          ALL: ${{ steps.all.outputs.all }}
          CHANGED: ${{ steps.filter.outputs.changes }}
          FILTER_RAN: ${{ steps.filter.outcome }}
        run: |
          set -euo pipefail
          # Use the filtered set only when paths-filter actually ran; otherwise
          # (push, dispatch, changed-only off) test everything.
          if [ "$FILTER_RAN" = "success" ]; then
            packages="$CHANGED"
          else
            packages="$ALL"
          fi
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Testing: $packages"

  test:
    needs: discover
    if: needs.discover.outputs.packages != '[]'
    # Per-package runner override (e.g. a GPU runner for a package whose tests
    # need CUDA); falls back to the shared `runner` when the package isn't in
    # the map. fromJSON('{}')[x] is null, so the default leaves all packages on
    # `runner`.
    runs-on: ${{ fromJSON(inputs.runners)[matrix.package] || inputs.runner }}
    permissions:
      contents: read
      id-token: write      # Azure OIDC login in setup
      checks: write        # dorny/test-reporter publishes a check per package
    strategy:
      fail-fast: false     # one package failing must not cancel the others
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: ${{ inputs.lfs }}
      - uses: greenroom-robotics/mise/.github/actions/test@v5
        with:
          gh-app-client-id: ${{ secrets.gh-app-client-id }}
          gh-app-private-key: ${{ secrets.gh-app-private-key }}
          azure-client-id: ${{ secrets.azure-client-id }}
          azure-tenant-id: ${{ secrets.azure-tenant-id }}
          azure-subscription-id: ${{ secrets.azure-subscription-id }}
          proxy-version: ${{ inputs.proxy-version }}
          package: ${{ matrix.package }}
          package-dir: ${{ inputs.package-dir }}
          report-dir: ${{ inputs.report-dir }}
          check-name: 'Test Report (pixi): ${{ matrix.package }}'
          jobs: ${{ inputs.jobs }}

  # Single stable status to require in branch protection. Matrix legs have
  # per-package names that can't be required directly; this collapses them into
  # one check that is green only when discovery succeeded and every leg passed.
  # An empty change set (PR touched no package) is a pass, not a failure.
  result:
    needs: [discover, test]
    if: always()
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - shell: bash
        run: |
          echo "discover=${{ needs.discover.result }} test=${{ needs.test.result }} packages=${{ needs.discover.outputs.packages }}"
          if [ "${{ needs.discover.result }}" != "success" ]; then
            echo "::error::package discovery failed"; exit 1
          fi
          if [ "${{ needs.discover.outputs.packages }}" = "[]" ]; then
            echo "no packages to test — nothing changed"; exit 0
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::one or more package test jobs did not pass"; exit 1
          fi
