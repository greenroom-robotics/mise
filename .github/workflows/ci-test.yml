# Reusable workflow: fan a multi-package repo's `mise ci test` across one runner
# per package (matrix), instead of looping all packages sequentially on one
# runner. Each package builds in full isolation — no shared build/, no CPU/RAM
# contention — at the cost of repeating the setup on each runner.
#
# Single-package repos don't need this; they keep using the actions/test
# composite directly. This wrapper just discovers packages → matrix → composite.
#
# Usage (in a consumer repo's .github/workflows/test.yml):
#
#   jobs:
#     test:
#       uses: greenroom-robotics/mise/.github/workflows/ci-test.yml@v5
#       with:
#         runner: runs-on=${{ github.run_id }}/runner=...
#         package-dir: packages
#         changed-only: true        # PRs test only changed packages
#         jobs: |
#           tests:test
#         # Optional: run some packages' tests inside a container (e.g. DeepStream
#         # on a GPU runner) while the rest stay on the host runner:
#         container-packages: '["detector"]'
#         container-image: nvcr.io/nvidia/deepstream:8.0-triton-multiarch
#         container-runner: runs-on=${{ github.run_id }}/family=g4dn.2xlarge/image=ubuntu24-gpu-x64
#         container-options: --gpus all --network host
#       secrets:
#         gh-app-client-id: ${{ secrets.GH_APP_CLIENT_ID }}
#         gh-app-private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
#         azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
#         azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
#         azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
name: mise ci test (matrix)

on:
  workflow_call:
    inputs:
      runner:
        description: runs-on label/expression for all jobs (e.g. a runs-on.com dynamic runner).
        required: true
        type: string
      container-packages:
        description: 'JSON array of packages whose tests run inside `container-image` on `container-runner` (e.g. DeepStream packages needing the SDK libs + GPU). Everything else runs on the host `runner`. Default [] keeps all packages on the host.'
        required: false
        type: string
        default: "[]"
      container-image:
        description: Container image for `container-packages` (e.g. nvcr.io/nvidia/deepstream:8.0-triton-multiarch). Required if `container-packages` is non-empty.
        required: false
        type: string
        default: ""
      container-runner:
        description: runs-on label for the container test job (e.g. a GPU runner). Falls back to `runner`.
        required: false
        type: string
        default: ""
      container-options:
        description: 'Extra `docker run` options for the container job (e.g. "--gpus all --network host").'
        required: false
        type: string
        default: ""
      package:
        description: Single package to test (default - all packages under package-dir).
        required: false
        type: string
        default: ""
      package-dir:
        description: Directory containing per-package pixi workspaces.
        required: false
        type: string
        default: packages
      report-dir:
        description: Directory to collect JUnit XML test reports into.
        required: false
        type: string
        default: test-reports
      jobs:
        description: Newline-separated `<env>:<task>` pairs to run per package (passed to actions/test).
        required: false
        type: string
        default: ""
      locked:
        description: Require the committed pixi.lock to satisfy the manifest and fail on drift. Off by default - re-resolve from the manifest (conda-forge style).
        required: false
        type: boolean
        default: false
      proxy-version:
        description: conda-channel-proxy release tag.
        required: false
        type: string
        default: v0.5.1
      changed-only:
        description: On pull_request, test only packages whose files changed (push/dispatch always test all).
        required: false
        type: boolean
        default: false
      lfs:
        description: Check out Git LFS objects in the test job (for repos with LFS test fixtures).
        required: false
        type: boolean
        default: false
    secrets:
      gh-app-client-id:
        required: true
      gh-app-private-key:
        required: true
      azure-client-id:
        required: true
      azure-tenant-id:
        required: true
      azure-subscription-id:
        required: true

jobs:
  # Cheap: list package dirs (optionally narrowed to changed ones on PRs) and
  # emit a matrix. No proxy/Azure/mise here so it costs seconds, not a full setup.
  discover:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      pull-requests: read   # paths-filter reads the PR's changed-file list
    outputs:
      packages: ${{ steps.assemble.outputs.packages }}
      host_packages: ${{ steps.assemble.outputs.host_packages }}
      container_packages: ${{ steps.assemble.outputs.container_packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # paths-filter diffs against the base ref

      - id: all
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
          PACKAGE_DIR: ${{ inputs.package-dir }}
        # ponytail: ~10 lines replacing the repos' colcon-list detect step.
        # The composite's --package wants the *directory* name, which is exactly
        # what we emit — so no colcon needed to resolve real paths. Ceiling:
        # assumes dir-name == package name (true for these flat repos) and
        # ignores root-[package] single-package repos (they use the composite).
        run: |
          set -euo pipefail
          if [ -n "$PACKAGE" ]; then
            names="$PACKAGE"
          else
            names=$(find "$PACKAGE_DIR" -mindepth 1 -maxdepth 1 -type d \
              -exec test -e '{}/pixi.toml' ';' -printf '%f\n' | sort)
          fi
          all=$(printf '%s' "$names" | jq -Rsc 'split("\n") | map(select(length>0))')
          if [ "$all" = "[]" ]; then
            echo "::error::no packages with pixi.toml found under $PACKAGE_DIR"; exit 1
          fi
          echo "all=$all" >> "$GITHUB_OUTPUT"
          # paths-filter map: one `pkg: '<dir>/pkg/**'` line per package.
          {
            echo 'map<<__EOF__'
            printf '%s' "$names" | while IFS= read -r n; do
              [ -n "$n" ] && printf "%s: '%s/%s/**'\n" "$n" "$PACKAGE_DIR" "$n"
            done
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      - id: filter
        if: ${{ inputs.changed-only && inputs.package == '' && github.event_name == 'pull_request' }}
        uses: dorny/paths-filter@v3
        with:
          filters: ${{ steps.all.outputs.map }}
          list-files: none

      - id: assemble
        shell: bash
        env:
          ALL: ${{ steps.all.outputs.all }}
          CHANGED: ${{ steps.filter.outputs.changes }}
          FILTER_RAN: ${{ steps.filter.outcome }}
          CONTAINER_PACKAGES: ${{ inputs.container-packages }}
        run: |
          set -euo pipefail
          # Use the filtered set only when paths-filter actually ran; otherwise
          # (push, dispatch, changed-only off) test everything.
          if [ "$FILTER_RAN" = "success" ]; then
            packages="$CHANGED"
          else
            packages="$ALL"
          fi
          # Split the to-test set into host vs container packages. jq array
          # subtraction: host = all - container; container = the rest.
          host=$(jq -cn --argjson all "$packages" --argjson c "$CONTAINER_PACKAGES" '$all - $c')
          cont=$(jq -cn --argjson all "$packages" --argjson c "$CONTAINER_PACKAGES" '$all - ($all - $c)')
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "host_packages=$host" >> "$GITHUB_OUTPUT"
          echo "container_packages=$cont" >> "$GITHUB_OUTPUT"
          echo "Host: $host  Container: $cont"

  # Host packages: run directly on `runner`.
  test:
    needs: discover
    if: needs.discover.outputs.host_packages != '[]'
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      id-token: write      # Azure OIDC login in setup
      checks: write        # dorny/test-reporter publishes a check per package
    strategy:
      fail-fast: false     # one package failing must not cancel the others
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.host_packages) }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: ${{ inputs.lfs }}
      - uses: greenroom-robotics/mise/.github/actions/test@v5
        with:
          gh-app-client-id: ${{ secrets.gh-app-client-id }}
          gh-app-private-key: ${{ secrets.gh-app-private-key }}
          azure-client-id: ${{ secrets.azure-client-id }}
          azure-tenant-id: ${{ secrets.azure-tenant-id }}
          azure-subscription-id: ${{ secrets.azure-subscription-id }}
          proxy-version: ${{ inputs.proxy-version }}
          package: ${{ matrix.package }}
          package-dir: ${{ inputs.package-dir }}
          report-dir: ${{ inputs.report-dir }}
          check-name: 'Test Report (pixi): ${{ matrix.package }}'
          jobs: ${{ inputs.jobs }}
          locked: ${{ inputs.locked }}

  # Container packages: same steps as `test`, but inside `container-image`
  # (e.g. a DeepStream image carrying the SDK runtime libs) on `container-runner`
  # (e.g. a GPU runner). A separate job because a per-row conditional `container:`
  # can't be expressed — the long form needed for `options: --gpus all` has no
  # "run on host" value. Step block is duplicated from `test` for the same reason
  # (GitHub Actions has no cross-job step reuse).
  test-container:
    needs: discover
    if: needs.discover.outputs.container_packages != '[]'
    runs-on: ${{ inputs.container-runner != '' && inputs.container-runner || inputs.runner }}
    container:
      image: ${{ inputs.container-image }}
      options: ${{ inputs.container-options }}
    permissions:
      contents: read
      id-token: write
      checks: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.container_packages) }}
    steps:
      # Container images (e.g. DeepStream) often lack git-lfs, which
      # actions/checkout needs when lfs:true. Install it first (no-op on the
      # host runner, but this job runs inside the image). apt-based images only.
      - name: Ensure git-lfs
        if: inputs.lfs
        shell: bash
        run: command -v git-lfs >/dev/null || { apt-get update && apt-get install -y git-lfs; }
      - uses: actions/checkout@v6
        with:
          lfs: ${{ inputs.lfs }}
      # Container packages (DeepStream, etc.) carry the heavy model/video LFS
      # fixtures that .lfsconfig fetchexclude keeps out of normal clones — but
      # their tests need them. Pull everything, overriding fetchexclude. Matches
      # what the legacy docker-based CIs did (`git lfs pull --exclude=""`).
      - name: Fetch all LFS objects
        if: inputs.lfs
        shell: bash
        run: git lfs pull --exclude=""
      - uses: greenroom-robotics/mise/.github/actions/test@v5
        with:
          gh-app-client-id: ${{ secrets.gh-app-client-id }}
          gh-app-private-key: ${{ secrets.gh-app-private-key }}
          azure-client-id: ${{ secrets.azure-client-id }}
          azure-tenant-id: ${{ secrets.azure-tenant-id }}
          azure-subscription-id: ${{ secrets.azure-subscription-id }}
          proxy-version: ${{ inputs.proxy-version }}
          package: ${{ matrix.package }}
          package-dir: ${{ inputs.package-dir }}
          report-dir: ${{ inputs.report-dir }}
          check-name: 'Test Report (pixi): ${{ matrix.package }}'
          jobs: ${{ inputs.jobs }}
          locked: ${{ inputs.locked }}

  # Single stable status to require in branch protection. Matrix legs have
  # per-package names that can't be required directly; this collapses them into
  # one check that is green only when discovery succeeded and every leg passed.
  # An empty change set (PR touched no package) is a pass, not a failure.
  result:
    needs: [discover, test, test-container]
    if: always()
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - shell: bash
        env:
          TEST: ${{ needs.test.result }}
          TEST_CONTAINER: ${{ needs.test-container.result }}
        run: |
          echo "discover=${{ needs.discover.result }} test=$TEST test-container=$TEST_CONTAINER packages=${{ needs.discover.outputs.packages }}"
          if [ "${{ needs.discover.result }}" != "success" ]; then
            echo "::error::package discovery failed"; exit 1
          fi
          if [ "${{ needs.discover.outputs.packages }}" = "[]" ]; then
            echo "no packages to test — nothing changed"; exit 0
          fi
          # Each test job is 'skipped' when its package set is empty — only an
          # actual failure should fail the gate.
          for r in "$TEST" "$TEST_CONTAINER"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::one or more package test jobs did not pass"; exit 1
            fi
          done
