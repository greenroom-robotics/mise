name: release
on:
  push:
    branches: [main]
jobs:
  release:
    runs-on: runs-on=${{ github.run_id }}/runner=1cpu-linux-x64
    permissions:
      id-token: write # Azure OIDC login in the release action
      contents: write # semantic-release commits CHANGELOG + cuts tags
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Dogfood the in-repo setup via a workflow-level local path. A relative
      # `uses: ./` inside a composite action resolves against the *consumer's*
      # workspace, so the release action can't reference local setup without
      # breaking external consumers — but at the workflow level `./` is this
      # repo's checkout. Running setup here (not the release action's pinned
      # setup@v2) means a fix living in setup itself takes effect on the same
      # run, instead of being stuck behind the v2 tag this job later slides.
      - id: setup
        uses: ./.github/actions/setup
        with:
          gh-app-client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          gh-app-private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # mise releases itself through its own action (the path it provides to
      # other pixi-native repos), not the deprecated recipes-release.yml.
      # package-dir "." -> the root pixi.toml is the package (see ci discover).
      # skip-setup -> reuse the setup above instead of the action's setup@v2.
      #
      # extra-prepare-cmd + extra-git-assets fold the Cargo.toml/Cargo.lock bump
      # into the same `chore(release)` commit and tag as pixi.toml, so
      # `mise --version` (CARGO_PKG_VERSION) tracks the released package without
      # a follow-up commit. This Rust-specific wiring lives here, not in the
      # generic `mise ci release` path which stays Cargo-agnostic.
      - uses: ./.github/actions/release
        with:
          skip-setup: "true"
          gh-token: ${{ steps.setup.outputs.gh-token }}
          gh-app-client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          gh-app-private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          package-dir: "."
          extra-git-assets: "Cargo.toml Cargo.lock"
          extra-prepare-cmd: "mise ci sync-cargo --version=${nextRelease.version}"

  # Slides the bare `v<MAJOR>` tag (e.g. `v1`, `v2`) forward whenever the
  # release job above cuts a new exact `mise@X.Y.Z` tag. Consumers pin
  # `uses: greenroom-robotics/mise/.github/actions/<name>@v<MAJOR>` and
  # automatically pick up minor/patch updates to the composite actions.
  #
  # This runs as a job here becase detecting a tag push will not trigger
  # any workflows since the tag is pushed by github app
  update-major-tag:
    needs: release
    runs-on: runs-on=${{ github.run_id }}/runner=1cpu-linux-x64
    permissions:
      contents: write
    steps:
      # App token, not the default GITHUB_TOKEN: sliding v<MAJOR> can move the
      # tag across a commit that edits a file under .github/workflows/, and
      # GitHub rejects such a ref push unless the pushing identity holds the
      # Workflows permission — which the App has and the default token cannot
      # be granted (there is no `workflows` scope in the permissions block).
      # App token scoped with the Workflows permission. Sliding v<MAJOR> can
      # move the tag across a commit that edits a file under .github/workflows/,
      # and GitHub rejects such a ref update (both `git push` and the REST API)
      # unless the pushing identity holds the Workflows permission. The default
      # GITHUB_TOKEN can't carry it, and the App token only carries it if the
      # GitHub App has been granted "Workflows: Read & write" in its settings.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-workflows: write

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Slide major tag to latest mise@ release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          # Newest exact release tag cut by semantic-release, e.g. mise@4.2.0.
          LATEST="$(git tag -l 'mise@*' | sort -V | tail -1)"
          if [ -z "$LATEST" ]; then
            echo "No mise@* tags found; nothing to slide."
            exit 0
          fi
          VERSION="${LATEST#mise@}"
          MAJOR="${VERSION%%.*}"
          if ! [[ "$MAJOR" =~ ^[0-9]+$ ]]; then
            echo "::error::could not parse major version from tag $LATEST" >&2
            exit 1
          fi
          SLIDING="v${MAJOR}"
          TARGET="$(git rev-list -n1 "$LATEST")"
          CURRENT="$(git rev-list -n1 "$SLIDING" 2>/dev/null || true)"
          if [ "$TARGET" = "$CURRENT" ]; then
            echo "$SLIDING already points at $TARGET ($LATEST); nothing to do."
            exit 0
          fi
          echo "Pointing $SLIDING at $TARGET (from $LATEST)"
          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${user_id}+${APP_SLUG}[bot]@users.noreply.github.com"
          git tag -f "$SLIDING" "$TARGET"
          git push origin "$SLIDING" --force
