name: release
on:
  push:
    branches: [main]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Azure OIDC login in the release action
      contents: write # semantic-release commits CHANGELOG + cuts tags
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Dogfood the in-repo setup via a workflow-level local path. A relative
      # `uses: ./` inside a composite action resolves against the *consumer's*
      # workspace, so the release action can't reference local setup without
      # breaking external consumers — but at the workflow level `./` is this
      # repo's checkout. Running setup here (not the release action's pinned
      # setup@v2) means a fix living in setup itself takes effect on the same
      # run, instead of being stuck behind the v2 tag this job later slides.
      - id: setup
        uses: ./.github/actions/setup
        with:
          gh-app-id: ${{ secrets.GH_APP_ID }}
          gh-app-private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # mise releases itself through its own action (the path it provides to
      # other pixi-native repos), not the deprecated recipes-release.yml.
      # package-dir "." -> the root pixi.toml is the package (see ci discover).
      # skip-setup -> reuse the setup above instead of the action's setup@v2.
      - uses: ./.github/actions/release
        with:
          skip-setup: "true"
          gh-token: ${{ steps.setup.outputs.gh-token }}
          gh-app-id: ${{ secrets.GH_APP_ID }}
          gh-app-private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          package-dir: "."

  # Keeps Cargo.toml/Cargo.lock in step with the version semantic-release just
  # wrote into the root pixi.toml [package], so `mise --version` (which reports
  # CARGO_PKG_VERSION) tracks the released package. This is a mise-specific
  # follow-up — it deliberately lives here rather than in the shared
  # `mise ci bump-pixi` path, which stays generic for non-Rust pixi packages.
  # Runs after release so it picks up the bumped pixi.toml; commits with
  # [skip ci] so it doesn't re-trigger the release.
  sync-cargo-version:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # App token so the commit can land on the protected main branch (the
      # default GITHUB_TOKEN can't push there), matching how semantic-release
      # itself commits in the release job.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync Cargo version to released pixi version
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          # Version semantic-release wrote into the root pixi.toml [package].
          VERSION="$(python3 -c 'import tomllib,sys; print(tomllib.load(open("pixi.toml","rb"))["package"]["version"])')"
          if [ -z "$VERSION" ]; then
            echo "::error::could not read [package].version from pixi.toml" >&2
            exit 1
          fi
          # Cargo.toml: only the version line inside the leading [package]
          # table (range stops at the next table header).
          sed -i '/^\[package\]/,/^\[/ s/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          # Cargo.lock: the version line immediately following the mise
          # [[package]] name entry.
          sed -i '/^name = "mise"$/{n;s/^version = ".*"/version = "'"$VERSION"'"/}' Cargo.lock
          if git diff --quiet -- Cargo.toml Cargo.lock; then
            echo "Cargo.toml/Cargo.lock already at ${VERSION}; nothing to do."
            exit 0
          fi
          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${user_id}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: sync Cargo version to ${VERSION} [skip ci]"
          git push origin HEAD:main

  # Slides the bare `v<MAJOR>` tag (e.g. `v1`, `v2`) forward whenever the
  # release job above cuts a new exact `mise@X.Y.Z` tag. Consumers pin
  # `uses: greenroom-robotics/mise/.github/actions/<name>@v<MAJOR>` and
  # automatically pick up minor/patch updates to the composite actions.
  #
  # This runs as a job here becase detecting a tag push will not trigger
  # any workflows since the tag is pushed by github app
  update-major-tag:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Slide major tag to latest mise@ release
        run: |
          set -euo pipefail
          # Newest exact release tag cut by semantic-release, e.g. mise@4.2.0.
          LATEST="$(git tag -l 'mise@*' | sort -V | tail -1)"
          if [ -z "$LATEST" ]; then
            echo "No mise@* tags found; nothing to slide."
            exit 0
          fi
          VERSION="${LATEST#mise@}"
          MAJOR="${VERSION%%.*}"
          if ! [[ "$MAJOR" =~ ^[0-9]+$ ]]; then
            echo "::error::could not parse major version from tag $LATEST" >&2
            exit 1
          fi
          SLIDING="v${MAJOR}"
          TARGET="$(git rev-list -n1 "$LATEST")"
          CURRENT="$(git rev-list -n1 "$SLIDING" 2>/dev/null || true)"
          if [ "$TARGET" = "$CURRENT" ]; then
            echo "$SLIDING already points at $TARGET ($LATEST); nothing to do."
            exit 0
          fi
          echo "Pointing $SLIDING at $TARGET (from $LATEST)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$SLIDING" "$TARGET"
          git push origin "$SLIDING" --force
